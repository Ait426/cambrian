input:
  type: "object"
  properties:
    code:
      type: "string"
      description: "리뷰할 소스 코드"
    language:
      type: "string"
      description: "프로그래밍 언어 (예: python, javascript, java, go)"
  required: ["code", "language"]

output:
  type: "object"
  properties:
    issues:
      type: "array"
      items:
        type: "object"
        properties:
          severity:
            type: "string"
            description: "심각도 (critical, warning, info)"
          line:
            type: "integer"
            description: "문제가 있는 라인 번호"
          message:
            type: "string"
            description: "문제 설명 및 개선 제안"
        required: ["severity", "line", "message"]
      description: "발견된 이슈 목록"
    summary:
      type: "string"
      description: "코드 리뷰 전체 요약"
  required: ["issues", "summary"]
