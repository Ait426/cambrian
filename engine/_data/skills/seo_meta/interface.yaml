input:
  type: "object"
  properties:
    url:
      type: "string"
      description: "대상 웹 페이지 URL"
    description:
      type: "string"
      description: "페이지 내용 설명"
    keywords:
      type: "array"
      items:
        type: "string"
      description: "타겟 키워드 목록"
  required: ["url", "description", "keywords"]

output:
  type: "object"
  properties:
    title:
      type: "string"
      description: "SEO 최적화된 페이지 타이틀"
    meta_description:
      type: "string"
      description: "메타 디스크립션 태그 내용"
    og_tags:
      type: "object"
      properties:
        og_title:
          type: "string"
          description: "Open Graph 타이틀"
        og_description:
          type: "string"
          description: "Open Graph 설명"
        og_type:
          type: "string"
          description: "Open Graph 타입"
        og_url:
          type: "string"
          description: "Open Graph URL"
      description: "Open Graph 메타 태그 객체"
  required: ["title", "meta_description", "og_tags"]
