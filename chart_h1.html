<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 H1 Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #F8FAFC;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chart-container {
            background: #FFFFFF;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 32px;
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }
        .footer {
            text-align: center;
            color: #94A3B8;
            font-size: 13px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #F1F5F9;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .chart-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <canvas id="myChart"></canvas>
        <div class="footer">6 data points · Generated by Cambrian</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [
                    {
                        label: 'Revenue',
                        data: [12500, 15800, 14200, 18900, 22100, 19500],
                        backgroundColor: 'rgba(79, 70, 229, 0.85)',
                        borderColor: '#4F46E5',
                        borderWidth: 0,
                        borderRadius: 6
                    },
                    {
                        label: 'Profit',
                        data: [3200, 4100, 3800, 5200, 6800, 5500],
                        backgroundColor: 'rgba(14, 165, 233, 0.85)',
                        borderColor: '#0EA5E9',
                        borderWidth: 0,
                        borderRadius: 6
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: '2026 H1 Performance',
                        font: {
                            size: 18,
                            weight: 600
                        },
                        color: '#1E293B'
                    },
                    legend: {
                        display: true,
                        position: 'bottom',
                        labels: {
                            usePointStyle: true
                        }
                    },
                    tooltip: {
                        backgroundColor: '#1E293B',
                        cornerRadius: 8,
                        padding: 12
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: '#F1F5F9'
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        }
                    }
                },
                animation: {
                    easing: 'easeOutQuart',
                    duration: 800
                }
            }
        });
    </script>
</body>
</html>
